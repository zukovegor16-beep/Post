name: Пост Трейдинг (тест с детальной ошибкой)

on:
  workflow_dispatch:

jobs:
  send-photo:
    runs-on: ubuntu-latest
    steps:
      - name: Отправка фото
        run: |
          python3 << 'PYEOF'
          import json, urllib.request

          TOKEN = "8664485659:AAHP0QkuqUg2rFW1McDrqVrKXcQHgHAOw-c"
          CHAT_ID = "-1004125779446"
          BASE = f"https://api.telegram.org/bot{TOKEN}"

          photo_url = "https://s10.iimage.su/s/16/g1ADdtgxzCjR4BHC11zqnRSKkTmZube97ChmdeNno.jpg"

          caption = (
              '<b>ТГ-канал с обучением трейдингу</b> <tg-emoji emoji-id="5431449001532594346">⚡️</tg-emoji>\n'
              '\n'
              '<tg-emoji emoji-id="5411520005386806155">🏁</tg-emoji> <b>На старте:</b>\n'
              'Пустой ТГ-канал про трейдинг и инвестиции.\n'
              '\n'
              '<tg-emoji emoji-id="5350460637182993292">🎯</tg-emoji> <b>Задача:</b>\n'
              'Набрать подписчиков для монетизации блога рекламой.\n'
              '\n'
              '<tg-emoji emoji-id="5244837092042750681">📈</tg-emoji> <b>Сейчас (первая неделя):</b>\n'
              '<tg-emoji emoji-id="5357471466919056181">🔘</tg-emoji> <b>475</b> переходов по <b>17,28 ₽</b>\n'
              '<tg-emoji emoji-id="5357471466919056181">🔘</tg-emoji> <b>249</b> подписчиков\n'
              '<tg-emoji emoji-id="5357471466919056181">🔘</tg-emoji> Конверсия в подписку — <b>52%</b>\n'
              '\n'
              '<tg-emoji emoji-id="5427009714745517609">✅</tg-emoji> Скрин статистики <tg-emoji emoji-id="5470177992950946662">👇</tg-emoji>\n'
              '\n'
              '<blockquote><tg-emoji emoji-id="5420315771991497307">🔥</tg-emoji> 249 живых подписчиков за неделю с конверсией 52% при стоимости перехода 17₽. Клиент увеличивает бюджет — результат пошёл.</blockquote>\n'
              '\n'
              '#ТаргетИнст #Трейдинг #ПродвижениеКанала'
          )

          keyboard = {
              "inline_keyboard": [
                  [{
                      "text": "💪Хочу так же для своего канала",
                      "url": "https://t.me/Keis_Market_bot"
                  }]
              ]
          }

          payload = {
              "chat_id": CHAT_ID,
              "photo": photo_url,
              "caption": caption,
              "parse_mode": "HTML",
              "reply_markup": keyboard
          }

          try:
              req = urllib.request.Request(
                  f"{BASE}/sendPhoto",
                  data=json.dumps(payload).encode("utf-8"),
                  headers={"Content-Type": "application/json"}
              )
              with urllib.request.urlopen(req) as resp:
                  result = json.loads(resp.read().decode())
              if result.get("ok"):
                  print(f"✅ Пост отправлен, message_id={result['result']['message_id']}")
              else:
                  print(f"❌ Ошибка API: {result}")
          except urllib.error.HTTPError as e:
              error_body = e.read().decode()
              print(f"❌ Ошибка API Telegram: {e.code} {e.reason}")
              print(f"Тело ответа: {error_body}")
          except Exception as e:
              print(f"❌ Исключение: {e}")
          PYEOF
